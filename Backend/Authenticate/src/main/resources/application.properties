spring.application.name=Authenticate
server.port=8085

spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

jwt.secret=c2hpcGZhc3Qtc2VjcmV0LWtleS1zaGlwZmFzdC1rZXk=
jwt.expiration=3600000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

eureka.client.enabled=false
operations.service.url=${OPERATIONS_SERVICE_URL:https://shipfast-operations-du7o.onrender.com}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,https://shipfast-hazel.vercel.app,https://shipfast-new.onrender.com}

# Faster startup
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=false
spring.main.lazy-initialization=true

spring.main.banner-mode=off
# Reduce hibernate startup time
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.server.port=
