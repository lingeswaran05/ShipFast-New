server:
  port: 8088

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/api/v1/auth/**,/api/auth/**,/api/v1/roles/**,/api/roles/**
        - id: shipment-service
          uri: ${SHIPMENT_SERVICE_URL}
          predicates:
            - Path=/api/v1/shipments/**,/api/public/**
        - id: operations-service
          uri: ${OPERATIONS_SERVICE_URL}
          predicates:
            - Path=/api/operations/**
        - id: admin-service
          uri: ${ADMIN_SERVICE_URL}
          predicates:
            - Path=/api/admin/**
        - id: communications-service
          uri: ${COMMUNICATIONS_SERVICE_URL}
          predicates:
            - Path=/api/notifications/**,/api/support/**
        - id: reporting-service
          uri: ${REPORTING_SERVICE_URL}
          predicates:
            - Path=/api/reports/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
