server:
  port: ${PORT:8088}
spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
              - "https://shipfast-hazel.vercel.app"
              - "https://shipfast-new.onrender.com"
              - "https://ship-fast-jbiy.vercel.app"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:https://shipfast-auth-joke.onrender.com}
          predicates:
            - Path=/api/v1/auth/**,/api/auth/**,/api/v1/roles/**,/api/roles/**
        - id: shipment-service
          uri: ${SHIPMENT_SERVICE_URL:https://shipfast-shipment-3e3f.onrender.com}
          predicates:
            - Path=/api/v1/shipments/**,/api/public/**
        - id: operations-service
          uri: ${OPERATIONS_SERVICE_URL:https://shipfast-operations-du7o.onrender.com}
          predicates:
            - Path=/api/operations/**
        - id: admin-service
          uri: ${ADMIN_SERVICE_URL:https://shipfast-admin-ix0r.onrender.com}
          predicates:
            - Path=/api/admin/**
        - id: communications-service
          uri: ${COMMUNICATIONS_SERVICE_URL:https://shipfast-communications-rn9l.onrender.com}
          predicates:
            - Path=/api/notifications/**,/api/support/**
        - id: reporting-service
          uri: ${REPORTING_SERVICE_URL:https://shipfast-reporting-ed3u.onrender.com}
          predicates:
            - Path=/api/reports/**
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

