server:
  port: 8088

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/auth/**,/api/auth/**

        - id: shipment-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/shipments/**,/api/public/**

        - id: operations-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/operations/**

        - id: admin-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/admin/**

        - id: communications-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/notifications/**,/api/support/**

        - id: reporting-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/reports/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
