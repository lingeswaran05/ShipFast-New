server.port=${PORT:8081}

spring.application.name=Shipment-service

spring.data.mongodb.uri=${MONGO_URI}
operations.service.url=${OPERATIONS_SERVICE_URL:https://shipfast-operations-du7o.onrender.com}
communications.service.url=${COMMUNICATIONS_SERVICE_URL:https://shipfast-communications-rn9l.onrender.com}
auth.service.url=${AUTH_SERVICE_URL:https://shipfast-auth-joke.onrender.com}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,https://shipfast-hazel.vercel.app,https://shipfast-new.onrender.com}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.main.lazy-initialization=true
spring.main.banner-mode=off
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.server.port=
