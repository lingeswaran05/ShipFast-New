server.port=8081

spring.application.name=Shipment-service

spring.data.mongodb.uri=${MONGO_URI}
operations.service.url=${OPERATIONS_SERVICE_URL:}
communications.service.url=${COMMUNICATIONS_SERVICE_URL:}
auth.service.url=${AUTH_SERVICE_URL:}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,https://shipfast-new.onrender.com}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.main.lazy-initialization=true
spring.main.banner-mode=off

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always